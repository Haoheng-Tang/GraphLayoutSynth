project:
  name: GraphLayoutSynth generic building
  building_type: GenericBuilding

random_seed_default: 42

generation:
  num_candidates: 5

allowed_node_types:
  - BuildingFloor
  - Zone
  - Corridor
  - PatientRoom
  - ClinicalSupport
  - StaffSupport

allowed_edge_types:
  - door
  - wall

zone_types:
  - public
  - private
  - service

room_type_counts:
  PatientRoom: 3
  ClinicalSupport: 1
  StaffSupport: 1

stochastic:
  min_zone_count: 2
  max_zone_count: 3
  min_cluster_size: 2
  max_cluster_size: 4
  corridor_pattern_choices:
    - linear
    - hub
  support_room_choices:
    - ClinicalSupport
    - StaffSupport

validation:
  require_connected_graph: true
  require_corridor_access: true
  allow_abstract_nodes_final: false

grammar_rules:
  - name: expand_floor_to_zones
    match:
      type: BuildingFloor
      is_abstract: true
    action:
      remove_matched_node: true
      create_nodes:
        - alias: public_zone
          type: Zone
          count: 1
          attributes:
            zone_type: PublicZone
            is_abstract: true
        - alias: private_zone
          type: Zone
          count: 1
          attributes:
            zone_type: PrivateZone
            is_abstract: true
        - alias: service_zone
          type: Zone
          count: 1
          attributes:
            zone_type: ServiceZone
            is_abstract: true
      create_edges:
        - source: public_zone
          target: private_zone
          edge_type: door
        - source: private_zone
          target: service_zone
          edge_type: door

  - name: expand_zone_to_room_cluster
    match:
      type: Zone
      is_abstract: true
    action:
      remove_matched_node: true
      create_nodes:
        - alias: corridor
          type: Corridor
          count: 1
          attributes:
            is_abstract: false
        - alias: room
          type:
            choices:
              - PatientRoom
              - ClinicalSupport
              - StaffSupport
          count:
            min: 3
            max: 5
          attributes:
            is_abstract: false
      create_edges:
        - source: corridor
          target: __neighbors__
          edge_type: door
          mode: one_to_each
        - source: room
          target: corridor
          edge_type: door
          mode: each_to_one
        - source: room
          target: room
          edge_type: wall
          mode: adjacent_pairs

ranking:
  weights:
    validation_passed: 100.0
    connected_graph: 20.0
    corridor_access_ratio: 30.0
    abstract_node_count: -20.0
    invalid_edge_type_count: -15.0
    disconnected_graph: -20.0
    edge_density: 10.0
    corridor_efficiency: 10.0
    door_wall_balance: 5.0
    distance_efficiency: 6.0
    dead_end_count: -2.0
    support_mix: 5.0
  targets:
    edge_node_ratio: 1.25
    corridor_fraction: 0.25
    door_wall_ratio: 4.0
    room_to_corridor_distance: 1.0
    max_room_to_corridor_distance_penalty_window: 4.0
    support_room_ratio: 0.25

visualization:
  node_colors:
    BuildingFloor: '#9e9e9e'
    Zone: '#f4f1de'
    Corridor: '#f2cc8f'
    PatientRoom: '#e07a5f'
    ClinicalSupport: '#81b29a'
    StaffSupport: '#3d405b'

  unknown_node_color: "#c7c7c7"
