version: 1
design_intent: >-
  Generate more varied layouts with better typed accessibility and lower
  wall-adjacency risk while using an explicit patient/support room mix.
room_mix_targets:
  enabled: true
  patient_alias: patient
  clinical_alias: clinical
  staff_alias: staff
  patient_total_min: 60
  patient_total_max: 100
  clinical_ratio: 0.25
  staff_ratio: 0.10
  ratio_tolerance: 0.2
  suggested_per_zone_counts:
    patient:
      min: 20
      max: 33
    clinical:
      min: 6
      max: 10
    staff: 
      min: 2
      max: 4
  expected_room_type_counts:
    PatientRoom: 70
    ClinicalSupport: 25
    StaffSupport: 7
